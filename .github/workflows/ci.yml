name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        react: ['18', '19']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - if: matrix.react == '18'
        run: npm install --no-save react@18 react-dom@18 @types/react@18 @types/react-dom@18
      - run: npm run lint
      - run: npm run build
